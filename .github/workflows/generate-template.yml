name: Generate Template
on:
  workflow_dispatch:
  

jobs:
  generate-template:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Copy project files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "./template-output/.github/workflows" -Force
      
          Copy-Item -Path ".github/workflows/run-unit-tests.yml" -Destination "./template-output/.github/workflows/run-unit-tests.yml" -Recurse -Force
          Copy-Item -Path "*.sln*" -Destination "./template-output" -Force
          Copy-Item -Path ".gitignore" -Destination "./template-output/.gitignore" -Force
          Copy-Item -Path "LICENSE.txt" -Destination "./template-output/LICENSE.txt" -Force
          Copy-Item -Path "README.md" -Destination "./template-output/README.md" -Force
          Copy-Item -Path "WinUI3 Template.vstemplate" "./template-output/WinUI3 Template.vstemplate" -Force

          Copy-Item -Path "WinUiTemplate" -Destination "./template-output/WinUiTemplate" -Recurse -Exclude @("bin", "obj", ".vs", "*.user")
          Copy-Item -Path "WinUiTemplate.Core" -Destination "./template-output/WinUiTemplate.Core" -Recurse -Exclude @("bin", "obj")
          Copy-Item -Path "WinUiTemplate.Tests" -Destination "./template-output/WinUiTemplate.Tests" -Recurse -Exclude @("bin", "obj")

          Remove-Item -Path "./template-output/*/bin" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "./template-output/*/obj" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "./template-output/*/.vs" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Replace project name
        shell: pwsh
        run: |
          Get-ChildItem -Path "./template-output" -Recurse -File | ForEach-Object {
            if ($_.Extension -match '\.(cs|csproj|xml|xaml|json|sln|slnx|txt|md)$') {
              (Get-Content $_.FullName -Raw) -replace 'WinUiTemplate', '$safeprojectname$' | Set-Content $_.FullName -NoNewLine
            }
          }

          Get-ChildItem -Path "./template-output" -Recurse -Depth 5 |
            Where-Object { $_.Name -like '*WinUiTemplate*' } |
            Sort-Object -Property FullName -Descending |
            ForEach-Object {
              $newName = $_.Name -replace 'WinUiTemplate', '$safeprojectname$'
              Rename-Item -Path $_.FullName -NewName $newName
            }
            
      - name: Upload template artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinUi3 Template
          path: ./template-output/