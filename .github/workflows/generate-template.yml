name: Generate Template
on:
  workflow_dispatch:
  

jobs:
  generate-template:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Copy project files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "./template-output/.github/workflows" -Force
      
          Copy-Item -Path ".github/workflows/run-unit-tests.yml" -Destination "./template-output/.github/workflows/run-unit-tests.yml" -Recurse -Force
          Copy-Item -Path "*.sln*" -Destination "./template-output" -Force
          Copy-Item -Path ".gitignore" -Destination "./template-output/.gitignore" -Force
          Copy-Item -Path "LICENSE.txt" -Destination "./template-output/LICENSE.txt" -Force
          Copy-Item -Path "README.md" -Destination "./template-output/README.md" -Force
          Copy-Item -Path "WinUI3 Template.vstemplate" -Destination "./template-output/WinUI3 Template.vstemplate" -Force

          Copy-Item -Path "WinUiTemplate" -Destination "./template-output/WinUiTemplate" -Recurse -Exclude @("bin", "obj", ".vs", "*.user")
          Copy-Item -Path "WinUiTemplate.Core" -Destination "./template-output/WinUiTemplate.Core" -Recurse -Exclude @("bin", "obj")
          Copy-Item -Path "WinUiTemplate.Tests" -Destination "./template-output/WinUiTemplate.Tests" -Recurse -Exclude @("bin", "obj")

          Remove-Item -Path "./template-output/*/bin" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "./template-output/*/obj" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "./template-output/*/.vs" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Replace project name
        shell: pwsh
        run: |
          Get-ChildItem -Path "./template-output" -Recurse -File | ForEach-Object {
            if ($_.Extension -match '\.(cs|csproj|xml|xaml|json|sln|slnx|txt|md)$') {
              (Get-Content $_.FullName -Raw) -replace 'WinUiTemplate', '$safeprojectname$' | Set-Content $_.FullName -NoNewLine
            }
          }

          Get-ChildItem -Path "./template-output" -Recurse -Depth 5 |
            Where-Object { $_.Name -like '*WinUiTemplate*' } |
            Sort-Object -Property FullName -Descending |
            ForEach-Object {
              $newName = $_.Name -replace 'WinUiTemplate', '$safeprojectname$'
              Rename-Item -Path $_.FullName -NewName $newName
            }
            
      - name: Generate vstemplate files with full file listings
        shell: pwsh
        run: |
          function Generate-ProjectItemsXml {
              param([string]$ProjectPath, [string]$BaseFolder)
              
              $items = @()
              $folders = @{}
              
              Get-ChildItem -Path $ProjectPath -Recurse -File | ForEach-Object {
                  $relativePath = $_.FullName.Substring($BaseFolder.Length + 1)
                  $folder = Split-Path $relativePath -Parent
                  
                  if ([string]::IsNullOrEmpty($folder)) {
                      # Root level file
                      $ext = $_.Extension
                      $replaceParams = if ($ext -match '\.(cs|xaml|csproj|xml|json|manifest)$') { 'true' } else { 'false' }
                      $items += "    <ProjectItem ReplaceParameters=`"$replaceParams`">$($_.Name)</ProjectItem>"
                  } else {
                      if (-not $folders.ContainsKey($folder)) {
                          $folders[$folder] = @()
                      }
                      $folders[$folder] += $_
                  }
              }
              
              # Generate folder structure
              $folderPaths = $folders.Keys | Sort-Object
              foreach ($folderPath in $folderPaths) {
                  $parts = $folderPath -split '\\'
                  $indent = "    " * ($parts.Length + 1)
                  $folderName = $parts[-1]
                  
                  $items += "$indent<Folder Name=`"$folderName`" TargetFolderName=`"$folderName`">"
                  
                  foreach ($file in $folders[$folderPath]) {
                      $ext = $file.Extension
                      $replaceParams = if ($ext -match '\.(cs|xaml|csproj|xml|json)$') { 'true' } else { 'false' }
                      $relativePath = $file.FullName.Substring($BaseFolder.Length + 1)
                      $items += "$indent  <ProjectItem ReplaceParameters=`"$replaceParams`">$relativePath</ProjectItem>"
                  }
                  
                  $items += "$indent</Folder>"
              }
              
              return $items -join "`n"
          }
          
          # Main Project
          $mainProjectItems = Generate-ProjectItemsXml -ProjectPath "./template-output/`$safeprojectname`$" -BaseFolder (Resolve-Path "./template-output/`$safeprojectname`$").Path
          
          $mainTemplate = @"
          <VSTemplate Version="3.0.0" Type="Project" xmlns="http://schemas.microsoft.com/developer/vstemplate/2005">
            <TemplateData>
              <Name>WinUI 3 Main Application</Name>
              <Description>Main WinUI 3 application project</Description>
              <ProjectType>CSharp</ProjectType>
              <Hidden>true</Hidden>
            </TemplateData>
            <TemplateContent>
              <Project File="`$safeprojectname`$.csproj" ReplaceParameters="true">
          $mainProjectItems
              </Project>
            </TemplateContent>
          </VSTemplate>
          "@
          Set-Content -Path "./template-output/`$safeprojectname`$/WinUI3 Template.vstemplate" -Value $mainTemplate
          
          # Core Project
          $coreProjectItems = Generate-ProjectItemsXml -ProjectPath "./template-output/`$safeprojectname`$.Core" -BaseFolder (Resolve-Path "./template-output/`$safeprojectname`$.Core").Path
          
          $coreTemplate = @"
          <VSTemplate Version="3.0.0" Type="Project" xmlns="http://schemas.microsoft.com/developer/vstemplate/2005">
            <TemplateData>
              <Name>WinUI 3 Core Library</Name>
              <Description>Core business logic and services</Description>
              <ProjectType>CSharp</ProjectType>
              <Hidden>true</Hidden>
            </TemplateData>
            <TemplateContent>
              <Project File="`$safeprojectname`$.Core.csproj" ReplaceParameters="true">
          $coreProjectItems
              </Project>
            </TemplateContent>
          </VSTemplate>
          "@
          Set-Content -Path "./template-output/`$safeprojectname`$.Core/WinUI3 Template.vstemplate" -Value $coreTemplate
          
          # Tests Project
          $testsProjectItems = Generate-ProjectItemsXml -ProjectPath "./template-output/`$safeprojectname`$.Tests" -BaseFolder (Resolve-Path "./template-output/`$safeprojectname`$.Tests").Path
          
          $testsTemplate = @"
          <VSTemplate Version="3.0.0" Type="Project" xmlns="http://schemas.microsoft.com/developer/vstemplate/2005">
            <TemplateData>
              <Name>WinUI 3 Tests</Name>
              <Description>Unit tests project with xUnit</Description>
              <ProjectType>CSharp</ProjectType>
              <Hidden>true</Hidden>
            </TemplateData>
            <TemplateContent>
              <Project File="`$safeprojectname`$.Tests.csproj" ReplaceParameters="true">
          $testsProjectItems
              </Project>
            </TemplateContent>
          </VSTemplate>
          "@
          Set-Content -Path "./template-output/`$safeprojectname`$.Tests/WinUI3 Template.vstemplate" -Value $testsTemplate

      - name: Upload template artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinUi3 Template
          path: ./template-output/